<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Joelmo's Blog</title>
    <meta name="description" content="Admin login for Joelmo's Blog.">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="auth-page">
    <header class="site-header">
        <div class="container topbar">
            <a class="brand" href="/" aria-label="Go to homepage">Joelmo's Blog</a>
            <nav class="site-nav" aria-label="Main navigation">
                <a href="/">Home</a>
            </nav>
        </div>
    </header>

    <main class="auth-main">
        <section class="login-container" aria-labelledby="login-title">
            <p class="eyebrow" style="margin-bottom: -20px;">Admin access</p>
            <h1 id="login-title" style="margin-bottom: 10px;">Login</h1>
            <form id="login-form" class="login-form">
                <div class="field-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="field-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit">Login</button>
            </form>
        </section>
    </main>

    <footer class="site-footer auth-footer">
        <div class="container footer-content">
            <p>&copy; 2026 Joelmo's Blog. All rights reserved.</p>
        </div>
    </footer>
    <script src="/js/login.js"></script>

</body>

</html>
