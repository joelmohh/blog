<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joelmo's Blog</title>
    <meta name="description" content="Personal blog with ideas about development, product and the internet.">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container topbar">
            <a class="brand" href="#" aria-label="Go to homepage">Joelmo's Blog</a>
            <nav class="site-nav" aria-label="Main navigation">
                <a href="/feed.xml">RSS feed</a>
            </nav>
        </div>
    </header>

    <main>
        <section id="featured" class="hero">
            <!-- JS will populate this --> 
        </section>

        <section id="posts" class="posts">
            <div class="container">
                <div class="section-head">
                    <h2>Posts</h2>
                </div>

                <div class="post-grid">
                    <!-- JS will populate this -->
                </div>

                <div class="pagination">

                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container footer-content">
            <p>&copy; 2026 Joelmo's Blog. All rights reserved.</p>
        </div>
    </footer>
    <script src="./js/loader.js"></script>
</body>
</html>
