<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joelmo's blog</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    
    <header>
        <div class="logo"><h1>Joelmo's blog</h1></div>
        <div class="rcc-feed"><button class="btn btn-primary">A</button></div>
    </header>

    <main>
        <div class="hero recent">
            <div class="recent-title">
                <h2>Recent post example title</h2>
            </div>
            <div class="recent-data">
                <p>2024-06-01</p>
            </div>
            <div class="recent-content">
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate.</p>
            </div>
            <div class="recent-btn">
                <button class="btn btn-link">Read more</button>
            </div>
        </div>


        <div class="posts">
            <div class="post-card">
                <h3>Post example title</h3>
                <div class="post-type">
                    <p>2024-06-01</p>
                </div>
                <div class="post-desc">
                    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate.</p>
                </div>
                <div class="link links">
                    <a href="#" class="link">Read more</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p><span class="copyright">&copy;</span> 2023 Joelmo's blog. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
