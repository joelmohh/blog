
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Joelmo's Blog</title>
    <meta name="description" content="Admin dashboard for Joelmo's Blog.">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="admin-page">
    <header class="site-header">
        <div class="container topbar">
            <a class="brand" href="/" aria-label="Go to homepage">Joelmo's Blog</a>
            <a class="admin-link" href="/login">Logout</a>
        </div>
    </header>

    <main class="admin-main">
        <section class="admin-posts container">
            <div class="admin-head">
                <div>
                    <p class="eyebrow">Posts</p>
                    <h1>All posts</h1>
                </div>
                <a class="create-post-btn" href="#">Create post</a>
            </div>

            <div class="post-list">
                <a class="post-row" href="/admin/edit-post/${name}">
                    <span class="post-row-title">Title <br><span class="post-row-meta">Description</span></span>
                    <span class="post-row-meta">Creation date</span>
                </a>
            </div>

            <div class="pagination admin-pagination" aria-label="Pagination">
                <button class="page-btn active" type="button">1</button>
                <button class="page-btn" type="button">2</button>
                <button class="page-btn" type="button">3</button>
                <span class="page-ellipsis">...</span>
                <button class="page-btn" type="button">Next</button>
            </div>
        </section>
    </main>

    <script src="./js/admin.js"></script>
</body>

</html>
